
[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/api/create_preference"
  to = "/.netlify/functions/checkout"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
